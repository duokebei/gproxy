name: sync-downloads

on:
  workflow_run:
    workflows: ["build-binaries"]
    types: [completed]

permissions:
  actions: read
  contents: read

env:
  R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  DOWNLOADS_BASE_URL: https://download-gproxy.leenhawk.com

jobs:
  sync:
    name: Sync to R2
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Determine channel and tag
        id: meta
        env:
          WF_EVENT: ${{ github.event.workflow_run.event }}
          WF_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WF_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          event="$WF_EVENT"
          echo "trigger_event=$event" >> "$GITHUB_OUTPUT"

          if [ "$event" = "release" ]; then
            channel="stable"
            # Extract tag from the head branch (refs/tags/vX.Y.Z)
            tag="$WF_HEAD_BRANCH"
            version="${tag#v}"
          else
            channel="staging"
            tag="staging"
            # Read version from workspace Cargo.toml via API to avoid
            # checking out untrusted code in the workflow_run context.
            version="$(gh api "repos/${GITHUB_REPOSITORY}/contents/Cargo.toml?ref=${WF_HEAD_SHA}" \
              --jq '.content' | base64 -d | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Channel: $channel, Tag: $tag, Version: $version"

      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          name: signed-release-assets
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        run: find dist -type f | sort

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ env.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          EOF

      - name: Upload release assets to R2
        env:
          CHANNEL: ${{ steps.meta.outputs.channel }}
          TAG: ${{ steps.meta.outputs.tag }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          if [ "$CHANNEL" = "stable" ]; then
            # Upload to releases/{tag}/
            echo "Uploading to releases/$TAG/"
            rclone copy dist/ "r2:$BUCKET/releases/$TAG/" \
              --s3-no-check-bucket \
              --transfers 8

            # Copy to latest/
            echo "Syncing to latest/"
            rclone sync dist/ "r2:$BUCKET/latest/" \
              --s3-no-check-bucket \
              --transfers 8
          else
            # Upload to staging/
            echo "Syncing to staging/"
            rclone sync dist/ "r2:$BUCKET/staging/" \
              --s3-no-check-bucket \
              --transfers 8
          fi

      - name: Generate and upload latest.json
        env:
          CHANNEL: ${{ steps.meta.outputs.channel }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          if [ "$CHANNEL" = "stable" ]; then
            target="latest.json"
          else
            target="staging-latest.json"
          fi

          jq -n --arg v "$VERSION" --arg t "$TAG" \
            '{version: $v, tag: $t}' > "/tmp/$target"

          rclone copyto "/tmp/$target" "r2:$BUCKET/$target" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: no-cache, no-store, must-revalidate"

          echo "Uploaded $target:"
          cat "/tmp/$target"

      - name: Generate and upload manifest.json
        env:
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          # List all .zip files in the bucket (excluding .sha256 and .sig)
          rclone lsf "r2:$BUCKET" --recursive --files-only \
            --include "*.zip" \
            --s3-no-check-bucket \
            | sort > /tmp/all_zips.txt

          echo "Found $(wc -l < /tmp/all_zips.txt) zip files in bucket"

          # Build manifest.json
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq -Rn --arg ts "$generated_at" \
            '{generated_at: $ts, assets: [inputs | select(length > 0) | {path: .}]}' \
            /tmp/all_zips.txt > /tmp/manifest.json

          rclone copyto /tmp/manifest.json "r2:$BUCKET/manifest.json" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: no-cache, no-store, must-revalidate"

          echo "Uploaded manifest.json with $(jq '.assets | length' /tmp/manifest.json) assets"

      - name: Verify uploads
        env:
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          set -euo pipefail

          echo "=== Bucket contents ==="
          rclone lsf "r2:$BUCKET" --recursive --s3-no-check-bucket | head -50

          if [ "$CHANNEL" = "stable" ]; then
            echo "=== latest.json ==="
            rclone cat "r2:$BUCKET/latest.json" --s3-no-check-bucket
          else
            echo "=== staging-latest.json ==="
            rclone cat "r2:$BUCKET/staging-latest.json" --s3-no-check-bucket
          fi
