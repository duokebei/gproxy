name: build-binary

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-msvc:
    name: Build Windows MSVC binary
    runs-on: ubuntu-latest

    env:
      CARGO_TERM_COLOR: always
      # 如果项目包含 C/C++ 依赖，这两行通常有帮助
      CC_x86_64_pc_windows_msvc: clang-cl
      CXX_x86_64_pc_windows_msvc: clang-cl
      # 如需静态 CRT，可取消下一行注释
      # RUSTFLAGS: -C target-feature=+crt-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            lld \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        uses: taiki-e/install-action@cargo-xwin

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc-x86_64

      - name: Build
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-x86_64
          path: |
            target/x86_64-pc-windows-msvc/release/*.exe
            target/x86_64-pc-windows-msvc/release/*.pdb
          if-no-files-found: error
