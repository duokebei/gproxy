name: test-build-binaries

on:
  push:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GPROXY_UPDATE_CHANNEL: ${{ github.event_name == 'push' && 'staging' || 'stable' }}

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build console
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @gproxy/console build

      # The console build emits to `frontend/console/dist` AND copies to
      # `apps/gproxy/web/console` via the `sync-to-embed.mjs` postbuild
      # step. The Rust binary embeds from the `web/console` path, so the
      # downstream `build` job downloads this artifact straight into that
      # location to short-circuit having to install pnpm everywhere.
      - name: Upload console embed
        uses: actions/upload-artifact@v7
        with:
          name: console-embed
          path: apps/gproxy/web/console
          retention-days: 1

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }})
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-24.04-arm
            arch: aarch64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: musl
            cross: true
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: aarch64
            libc: musl
            cross: true
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: x86_64
            android_abi: x86_64
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: aarch64
            android_abi: arm64-v8a
            run_check: false
          - platform: windows
            runner: windows-latest
            arch: x86_64
            run_check: true
          - platform: windows
            runner: windows-latest
            arch: aarch64
            run_check: false
          - platform: macos
            runner: macos-latest
            arch: x86_64
            run_check: true
          - platform: macos
            runner: macos-latest
            arch: aarch64
            run_check: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download console embed
        uses: actions/download-artifact@v8
        with:
          name: console-embed
          path: apps/gproxy/web/console

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-

      - name: Derive target metadata
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)
              target="${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}"
              artifact="gproxy-linux-${{ matrix.arch }}"
              if [ "${{ matrix.libc }}" = "musl" ]; then
                artifact="${artifact}-musl"
              fi
              artifact="${artifact}.zip"
              ext=""
              ;;
            android)
              target="${{ matrix.arch }}-linux-android"
              artifact="gproxy-android-${{ matrix.arch }}.zip"
              ext=""
              ;;
            windows)
              target="${{ matrix.arch }}-pc-windows-msvc"
              artifact="gproxy-windows-${{ matrix.arch }}.zip"
              ext=".exe"
              ;;
            macos)
              target="${{ matrix.arch }}-apple-darwin"
              artifact="gproxy-macos-${{ matrix.arch }}.zip"
              ext=""
              ;;
            *)
              echo "unknown platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          echo "TARGET=$target" >> "$GITHUB_ENV"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "BIN_EXT=$ext" >> "$GITHUB_ENV"

      - name: Install target
        run: rustup target add "$TARGET"

      - name: Install Android NDK
        if: ${{ matrix.platform == 'android' }}
        uses: android-actions/setup-android@v4

      - name: Install Android toolchain
        if: ${{ matrix.platform == 'android' }}
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          cargo install cargo-ndk --locked

      - name: Install cross
        if: ${{ matrix.cross }}
        run: |
          cargo install cross --locked
          echo "CROSS_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "CROSS_NO_DEFAULT_TOOLCHAIN=1" >> "$GITHUB_ENV"

      - name: Build (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "$TARGET" -p gproxy
          elif [ "${{ matrix.platform }}" = "android" ]; then
            cargo ndk -t ${{ matrix.android_abi }} build --release -p gproxy
          else
            cargo build --release --target "$TARGET" -p gproxy
          fi

      - name: Build (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --release --target "$env:TARGET" -p gproxy

      - name: Run --help check before UPX (unix)
        if: ${{ runner.os != 'Windows' && matrix.run_check }}
        run: |
          cd target/$TARGET/release
          ./gproxy --help

      - name: Run --help check before UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.run_check }}
        shell: pwsh
        run: |
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          & $bin --help

      - name: Install UPX (linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl zip

      - name: Install UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.arch != 'aarch64' }}
        shell: pwsh
        run: choco install upx -y

      - name: Compress binary (non-macos)
        if: ${{ runner.os != 'macOS' && !(matrix.platform == 'windows' && matrix.arch == 'aarch64') }}
        run: upx --best --lzma target/$TARGET/release/gproxy$BIN_EXT

      - name: Run --help check after UPX (unix)
        if: ${{ runner.os != 'Windows' && runner.os != 'macOS' && matrix.run_check }}
        run: |
          cd target/$TARGET/release
          ./gproxy --help

      - name: Run --help check after UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.run_check && matrix.arch != 'aarch64' }}
        shell: pwsh
        run: |
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          & $bin --help

      - name: Codesign (macos)
        if: ${{ runner.os == 'macOS' }}
        run: codesign --force --sign - target/$TARGET/release/gproxy$BIN_EXT

      - name: Prepare Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        run: |
          mkdir -p docker-binary
          cp target/$TARGET/release/gproxy docker-binary/gproxy

      - name: Upload Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        uses: actions/upload-artifact@v7
        with:
          name: docker-bin-${{ env.TARGET }}
          path: docker-binary/gproxy
          retention-days: 1

      # Repo has no LICENSE file yet, so the package only ships the
      # binary + README. Add LICENSE here once we pick one.
      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          mkdir -p dist
          cp target/$TARGET/release/gproxy$BIN_EXT dist/gproxy$BIN_EXT
          cp README.md dist/
          (cd dist && zip -9 ../$ARTIFACT gproxy$BIN_EXT README.md)
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"

      - name: Package (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          $outBin = Join-Path -Path "dist" -ChildPath "gproxy$env:BIN_EXT"
          Copy-Item -Path $bin -Destination $outBin
          Copy-Item -Path README.md -Destination dist\
          Compress-Archive -Path $outBin,dist\README.md -DestinationPath $env:ARTIFACT -Force
          $hash = (Get-FileHash $env:ARTIFACT -Algorithm SHA256).Hash.ToLower()
          "${hash}  $env:ARTIFACT" | Out-File -Encoding ASCII "$env:ARTIFACT.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ env.TARGET }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          retention-days: 1

      - name: Upload release assets
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.zip.sha256
          overwrite_files: true
